<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>加载中...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            background: #0a0f1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui;
            padding: 20px;
        }
        .card {
            background: #111a28;
            border-radius: 48px;
            padding: 40px 30px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a4a6a;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5);
        }
        .status-icon { font-size: 4rem; margin-bottom: 20px; }
        h2 { color: #ddeeff; margin-bottom: 20px; font-weight: 500; }
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #1e2a3a;
            border-radius: 20px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: #1e88e5;
            transition: width 0.05s linear;
        }
        .error-message { color: #ffaa88; margin: 20px 0; font-size: 1.1rem; }
        .retry-btn {
            background: #ff4444;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }
        .retry-btn:active { transform: scale(0.96); }
        .big-text {
            font-size: 3.5rem;
            font-weight: 800;
            color: #ffaa33;
            text-shadow: 0 0 10px red;
            margin: 30px 0;
            animation: shake 0.3s ease-in-out 0s 2;
        }
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
            100% { transform: translateX(0); }
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card" id="mainCard">
    <div class="status-icon" id="statusIcon">⏳</div>
    <h2 id="mainText">正在加载资源，请稍候...</h2>
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    <div id="errorPanel" style="display: none;">
        <div class="error-message">⚠️ 连接超时，资源加载失败 ⚠️</div>
        <button class="retry-btn" id="retryBtn">重试</button>
    </div>
</div>
<script>
    let progress = 0;
    let interval, timeout;
    const progressFill = document.getElementById('progressFill');
    const mainText = document.getElementById('mainText');
    const statusIcon = document.getElementById('statusIcon');
    const progressBarDiv = document.getElementById('progressBar');
    const errorPanel = document.getElementById('errorPanel');
    const retryBtn = document.getElementById('retryBtn');

    function startLoading() {
        progress = 0;
        progressFill.style.width = '0%';
        errorPanel.style.display = 'none';
        progressBarDiv.style.display = 'block';
        mainText.innerText = '正在加载资源，请稍候...';
        statusIcon.innerText = '⏳';
        if (interval) clearInterval(interval);
        if (timeout) clearTimeout(timeout);

        interval = setInterval(() => {
            progress += Math.random() * 12;
            if (progress >= 100) {
                progress = 100;
                progressFill.style.width = '100%';
                clearInterval(interval);
                setTimeout(() => showError(), 300);
            } else {
                progressFill.style.width = progress + '%';
            }
        }, 100);

        timeout = setTimeout(() => {
            if (progress < 100) {
                clearInterval(interval);
                showError();
            }
        }, 5000);
    }

    function showError() {
        progressBarDiv.style.display = 'none';
        errorPanel.style.display = 'block';
        mainText.innerText = '加载失败';
        statusIcon.innerText = '❌';
    }

    retryBtn.addEventListener('click', () => {
        document.getElementById('mainCard').innerHTML = `
            <div class="big-text">你个傻逼</div>
            <button id="resetPrank" style="background:#1e88e5; border:none; padding:10px 20px; border-radius:40px; color:white; margin-top:30px; cursor:pointer;">🔄 再试一次</button>
        `;
        document.getElementById('resetPrank').addEventListener('click', () => location.reload());
    });

    startLoading();
</script>
</body>
</html>
